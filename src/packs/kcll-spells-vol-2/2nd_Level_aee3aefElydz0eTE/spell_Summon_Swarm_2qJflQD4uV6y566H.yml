  description:
    value: >-
      <p>You call forth a magical swarm, which manifests in an unoccupied space
      that you can see within range. It uses the Swarm Spirit stat block, and
      you select either the Quippers, Spiders, or Wasps option when you cast the
      spell. The creature disappears when it drops to 0 hit points or when the
      spell ends.</p><p>The creature is an ally to you and your companions. In
      combat, it shares your initiative count, and takes its turn immediately
      after yours. It obeys your verbal commands. If you don’t issue any
      command, it takes the Dodge action and moves only to avoid
      hazards.</p><p><em><strong>At Higher Levels.</strong></em> When you cast
      this spell using a spell slot of 3rd level or higher, certain values
      increase in its stat
      block.</p><p>@UUID[Compendium.kibbles-compendium-of-legends-and-legacies.kcll-monsters.Actor.jkbkg3SUCPdHUzur]{Swarm

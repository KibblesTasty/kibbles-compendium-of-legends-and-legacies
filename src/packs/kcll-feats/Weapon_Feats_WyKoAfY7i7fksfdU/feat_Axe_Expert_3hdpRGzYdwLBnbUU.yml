  description:
    value: >-
      <p>You wield an axe like a force of nature, maximizing and embodying its
      relentless and unstoppable power. You gain the following
      benefits:</p><ul><li><strong>Ability Score Bonus.</strong> Increase your
      Strength or Constitution ability score by 1, to a maximum of
      20.</li><li><strong>Axe Rush.</strong> While wielding a handaxe,
      battleaxe, or greataxe, you can use a bonus action to move up to 5 feet
      and add 1d6 to your next attack and damage roll with an axe</li></ul>
